{% extends "base.html" %}

{% block title %}404 Not Found - TaskManager{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 3rem; color: #f39c12; margin-bottom: 1rem;">404</h1>
    <h2 style="color: #2c3e50; margin-bottom: 1rem;">Page Not Found</h2>
    <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">
        The page you're looking for doesn't exist.
    </p>
    <a href="{{ url_for('auth.home') }}" 
       style="background-color: #3498db; color: white; padding: 0.8rem 1.5rem; text-decoration: none; border-radius: 5px; font-size: 1rem;">
        ← Go Back Home
    </a>
</div>
{% endblock %}
