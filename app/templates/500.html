{% extends "base.html" %}

{% block title %}500 Server Error - TaskManager{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 3rem; color: #c0392b; margin-bottom: 1rem;">500</h1>
    <h2 style="color: #2c3e50; margin-bottom: 1rem;">Internal Server Error</h2>
    <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem;">
        Something went wrong on our end. Please try again later.
    </p>
    <a href="{{ url_for('auth.home') }}" 
       style="background-color: #3498db; color: white; padding: 0.8rem 1.5rem; text-decoration: none; border-radius: 5px; font-size: 1rem;">
        ← Go Back Home
    </a>
</div>
{% endblock %}
